name: Benchmark

on:
  push:
    branches:
      - main

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Install Wayland development libraries
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libwayland-dev

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run cargo bench
      run: |
        cargo install cargo-criterion
        echo "### Cargo bench output:" >> $GITHUB_STEP_SUMMARY
        cargo bench | tee -a $GITHUB_STEP_SUMMARY
